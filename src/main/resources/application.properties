spring.datasource.url=jdbc:mysql://localhost:3306/wigell_mc_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Honung2021!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# OAuth2 / Security
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/keycloakdemo

# Keycloak-specifikt
keycloak.server-url=http://localhost:8081
keycloak.realm=keycloakdemo

# Keycloak Admin
keycloak.admin.realm=keycloakdemo
keycloak.admin.client-id=spring-app-admin
keycloak.admin.client-secret=